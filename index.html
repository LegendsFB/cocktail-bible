    <style>
        body { background-color: #000000; color: #ffffff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .cocktail-button { background-color: #1a1a1a; border-radius: 12px; transition: background-color 0.1s; }
        .cocktail-button:active { background-color: #333333; }
        .house-tag { color: #fbbf24; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-right: 8px; }
        input { background-color: #1a1a1a !important; color: white !important; border-radius: 12px !important; }
        .chevron { width: 16px; height: 16px; fill: none; stroke: #666; stroke-width: 2.5; stroke-linecap: round; transition: transform 0.2s; }
        .open .chevron { transform: rotate(180deg); stroke: #fbbf24; }
        
        /* Modal Animation */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>

        function App() {
            const [search, setSearch] = useState("");
            const [openId, setOpenId] = useState(null);
            const [showQR, setShowQR] = useState(false);

            const filtered = useMemo(() => {
                const t = search.toLowerCase().trim();
                const list = [...DATA].sort((a, b) => {
                    if (a.isHouse && !b.isHouse) return -1;
                    if (!a.isHouse && b.isHouse) return 1;
                    return a.name.localeCompare(b.name);
                });
                if (!t) return list;
                return list.filter(c => c.name.toLowerCase().includes(t) || c.recipe.toLowerCase().includes(t));
            }, [search]);

            // Logic for permanent host detection
            const currentUrl = window.location.href;
            const qrUrl = `https://legendsfb.github.io/staff-bible/`;

            return React.createElement('div', { className: "max-w-xl mx-auto p-4 min-h-screen pb-20" },

    className:

  },
  'Show Staff QR'

                    type: "text",
                    placeholder: "Search all 87 recipes...",
                    className: "w-full p-4 text-lg outline-none border-none mb-6",
                    value: search,
                    onChange: (e) => { setSearch(e.target.value); setOpenId(null); }
                }),

                // List
                React.createElement('div', { className: "space-y-2" },
                    filtered.map((c, i) => {
                        const isOpen = openId === i;
                        return React.createElement('div', { key: c.name },
                            React.createElement('button', {
                                onClick: () => setOpenId(isOpen ? null : i),
                                className: `w-full text-left p-5 flex items-center justify-between cocktail-button ${isOpen ? 'bg-zinc-800 open' : ''}`
                            },
                                React.createElement('div', { className: "flex items-center" },

                                    React.createElement('div', { className: "text-zinc-500 text-[10px] font-bold uppercase mb-1" }, "Recipe"),
                                    React.createElement('p', { className: "text-xl font-bold text-white leading-tight" }, c.recipe)
                                ),
                                React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                                    React.createElement('div', null,
                                        React.createElement('div', { className: "text-zinc-500 text-[10px] font-bold uppercase" }, "Glass"),
                                        React.createElement('div', { className: "text-base font-medium text-neutral-200" }, c.glass)
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('div', { className: "text-zinc-500 text-[10px] font-bold uppercase" }, "Garnish"),
                                        React.createElement('div', { className: "text-base font-medium text-neutral-200" }, c.garnish)
                                    )
                                ),
                                React.createElement('div', { className: "pt-2 border-t border-zinc-800" },
                                    React.createElement('div', { className: "text-zinc-500 text-[10px] font-bold uppercase mb-1" }, "Build Method"),
                                    React.createElement('p', { className: "text-sm text-zinc-400 italic" }, c.method)
                                )
                            )
                        );
                    })
                ),

                // QR Modal Overlay
                showQR && React.createElement('div', { className: "fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-6 backdrop-blur-sm" },
                    React.createElement('div', { className: "bg-zinc-900 w-full max-w-xs p-8 rounded-[2rem] text-center border border-zinc-800 animate-in" },

                            onClick: () => setShowQR(false),

                ),

                React.createElement('footer', { className: "mt-20 py-10 text-center text-[9px] text-zinc-600 uppercase tracking-[0.4em]" }, "Locked Version • 87 Drinks")
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
